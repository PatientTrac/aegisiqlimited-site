# AegisIQ Group corporate site (aegisiqgroup.com) — static deployment
# Legal operator: AegisIQ Limited (Hong Kong, BRN / UBI 79570488)
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Marketing / product pages (extensionless rewrites) ──────────────────────
[[redirects]]
  from = "/applications"
  to = "/#applications"
  status = 301
[[redirects]]
  from = "/products"
  to = "/#applications"
  status = 301
[[redirects]]
  from = "/compare"
  to = "/compare.html"
  status = 200
[[redirects]]
  from = "/equity"
  to = "/equity.html"
  status = 200
[[redirects]]
